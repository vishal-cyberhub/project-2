<!DOCTYPE html>
<html>
<head>
  <title>Login - WatchMe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="navbar">
    <div class="navbar-content">
      <div class="logo">
        <span class="logo-icon">▶</span>
        <span class="logo-text">WatchMe</span>
      </div>
      <div class="menu">
        <a href="index.html" class="menu-item">Home</a>
        <a href="index.html#movies" class="menu-item">Movies</a>
        <a href="index.html#series" class="menu-item">Series</a>
        <a href="index.html#list" class="menu-item">My List</a>
      </div>
      <div class="navbar-right">
        <a href="login.html" class="user-btn">
          <span class="user-icon">👤</span>
          <span class="user-text">Login</span>
        </a>
      </div>
    </div>
  </div>

  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to WatchMe</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email or Phone</label>
          <input type="text" id="email" name="email" placeholder="Enter your email or phone" required>
          <span class="input-focus-line"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <button type="button" class="toggle-password" id="togglePassword">
              <span class="eye-icon">👁️</span>
            </button>
            <span class="input-focus-line"></span>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember">
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">
          <span>Sign In</span>
          <div class="btn-loader"></div>
        </button>

        <div class="divider">
          <span>OR</span>
        </div>

        <div class="social-login">
          <button type="button" class="social-btn google-btn">
            <span class="social-icon">🔍</span>
            <span>Continue with Google</span>
          </button>
          <button type="button" class="social-btn facebook-btn">
            <span class="social-icon">📘</span>
            <span>Continue with Facebook</span>
          </button>
        </div>

        <div class="signup-link">
          <p>New to WatchMe? <a href="signup.html">Sign up now</a></p>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePassword.querySelector('.eye-icon').textContent = type === 'password' ? '👁️' : '🙈';
    });

    // Form validation and submission
    const loginForm = document.getElementById('loginForm');
    const loginBtn = loginForm.querySelector('.login-btn');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      // Show loading state
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      // Simulate API call
      setTimeout(() => {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
        
        // Get form values
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Simple validation
        if (email && password) {
          alert('Login successful! Redirecting...');
          window.location.href = 'index.html';
        } else {
          alert('Please fill in all fields');
        }
      }, 1500);
    });

    // Input focus effects
    const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.classList.add('focused');
      });
      
      input.addEventListener('blur', function() {
        if (!this.value) {
          this.parentElement.classList.remove('focused');
        }
      });

      // Check if input has value on load
      if (input.value) {
        input.parentElement.classList.add('focused');
      }
    });

    // Social login buttons
    document.querySelectorAll('.social-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.add('clicked');
        setTimeout(() => {
          btn.classList.remove('clicked');
          alert('Social login feature coming soon!');
        }, 300);
      });
    });
  </script>
</body>
</html>
